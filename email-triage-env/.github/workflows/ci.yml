name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  validate:
    name: OpenEnv validate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyyaml

      - name: Start server
        run: |
          python app.py &
          sleep 4
          curl -sf http://localhost:7860/health

      - name: Run validator
        run: python validate.py --url http://localhost:7860

      - name: Run demo agent
        run: python demo_agent.py --env-url http://localhost:7860

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t email-triage-env:ci .

      - name: Run container + health check
        run: |
          docker run -d -p 7860:7860 --name env email-triage-env:ci
          sleep 6
          curl -sf http://localhost:7860/health
          docker stop env

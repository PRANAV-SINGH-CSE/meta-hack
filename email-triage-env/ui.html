<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Triage — OpenEnv</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --border: #2a2d40;
    --accent: #6c8aff;
    --accent2: #a78bfa;
    --success: #34d399;
    --warn: #fbbf24;
    --danger: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo svg { width: 32px; height: 32px; }
  .logo h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
  .logo span { font-size: 0.7rem; font-weight: 500; background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 99px; margin-left: 4px; }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.78rem; color: var(--muted);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }
  .dot.online { background: var(--success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Layout ── */
  main {
    display: grid;
    grid-template-columns: 320px 1fr 300px;
    height: calc(100vh - 65px);
    overflow: hidden;
  }
  .panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
  }
  .panel:last-child { border-right: none; border-left: 1px solid var(--border); }
  .panel-title {
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px;
  }

  /* ── Task cards ── */
  .task-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .task-card:hover { border-color: var(--accent); }
  .task-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .task-card h3 { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
  .task-card p { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }
  .badge {
    display: inline-block; font-size: 0.65rem; font-weight: 600;
    padding: 2px 7px; border-radius: 99px; margin-bottom: 6px;
  }
  .badge.easy { background: #052e16; color: var(--success); }
  .badge.medium { background: #431407; color: var(--warn); }
  .badge.hard { background: #3b0764; color: var(--accent2); }

  /* ── Email pane ── */
  #email-pane {
    display: flex; flex-direction: column; height: 100%; overflow: hidden;
  }
  .progress-bar-wrap {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .progress-bar {
    flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--accent); border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }

  .email-card {
    margin: 20px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; flex: 0 0 auto;
  }
  .email-header { padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .email-meta { display: grid; grid-template-columns: auto 1fr; gap: 2px 10px; font-size: 0.78rem; }
  .email-meta .label { color: var(--muted); }
  .email-subject { font-size: 1rem; font-weight: 600; margin-bottom: 10px; }
  .email-body {
    padding: 14px 18px; font-size: 0.82rem; line-height: 1.7;
    color: #94a3b8; white-space: pre-wrap; word-break: break-word;
    max-height: 200px; overflow-y: auto;
  }

  /* ── Action form ── */
  .action-form {
    margin: 0 20px 20px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
    flex: 1; overflow-y: auto;
  }
  .action-form h4 { font-size: 0.78rem; font-weight: 600; margin-bottom: 14px; color: var(--accent); }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.72rem; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
  .field select, .field textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 8px 10px;
    font-size: 0.8rem; font-family: inherit; outline: none;
    transition: border-color 0.15s;
  }
  .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 70px; }
  .field.hidden { display: none; }

  .action-items-list { list-style: none; }
  .action-items-list li {
    display: flex; gap: 6px; margin-bottom: 6px;
  }
  .action-items-list input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 7px 10px;
    font-size: 0.78rem; font-family: inherit; outline: none;
  }
  .action-items-list input:focus { border-color: var(--accent); }
  .btn-ghost {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 0.75rem;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-submit {
    width: 100%; padding: 10px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s; margin-top: 10px;
  }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Right panel ── */
  .reward-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px; margin-bottom: 10px;
  }
  .reward-item .step-label { font-size: 0.68rem; color: var(--muted); margin-bottom: 4px; }
  .reward-item .reward-score {
    font-size: 1.4rem; font-weight: 700;
    color: var(--success);
  }
  .reward-item .reward-score.low { color: var(--danger); }
  .reward-item .reward-score.mid { color: var(--warn); }
  .reward-item .feedback { font-size: 0.7rem; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .breakdown {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
  }
  .breakdown-chip {
    font-size: 0.65rem; padding: 2px 7px; border-radius: 99px;
    background: var(--bg); border: 1px solid var(--border);
  }

  /* Episode complete banner */
  .episode-banner {
    background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
    border: 1px solid var(--accent2); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px; text-align: center;
  }
  .episode-banner h3 { font-size: 1rem; margin-bottom: 4px; }
  .episode-banner .big-score {
    font-size: 2.4rem; font-weight: 800; color: var(--accent2);
  }
  .episode-banner p { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* Placeholder */
  .placeholder {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: var(--muted);
    text-align: center; gap: 10px;
  }
  .placeholder svg { opacity: 0.2; }
  .placeholder p { font-size: 0.85rem; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="#6c8aff22"/>
      <path d="M6 10h20M6 10l10 8 10-8M6 10v12h20V10" stroke="#6c8aff" stroke-width="1.8" stroke-linejoin="round"/>
    </svg>
    <h1>Email Triage <span>OpenEnv</span></h1>
  </div>
  <div class="status-pill">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</header>

<main>
  <!-- Left: Task selection -->
  <aside class="panel" id="task-panel">
    <div class="panel-title">Tasks</div>
    <div id="task-list"></div>
    <div style="margin-top:16px;">
      <button class="btn-submit" id="start-btn" disabled style="background:var(--accent2)">
        Start Episode
      </button>
    </div>
  </aside>

  <!-- Centre: Email + Action form -->
  <section class="panel" style="padding:0; display:flex; flex-direction:column;" id="centre-panel">
    <div id="email-pane" style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
      <div class="placeholder" id="placeholder">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
        </svg>
        <p>Select a task on the left<br>and press <strong>Start Episode</strong></p>
      </div>
      <div id="episode-content" style="display:none;flex:1;overflow-y:auto;display:flex;flex-direction:column;">
        <div class="progress-bar-wrap">
          <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
          <span class="progress-label" id="progress-label">0 / 0</span>
        </div>
        <div id="email-card-wrap"></div>
        <div id="action-form-wrap" style="flex:1;overflow-y:auto;margin:0 20px 20px;"></div>
      </div>
    </div>
  </section>

  <!-- Right: Reward history -->
  <aside class="panel" id="reward-panel">
    <div class="panel-title">Reward History</div>
    <div id="reward-history">
      <div class="placeholder" style="height:200px;">
        <p style="font-size:0.75rem;">Rewards will appear here</p>
      </div>
    </div>
  </aside>
</main>

<script>
const BASE = '';   // same origin
let sessionId = null;
let currentTask = null;
let taskMeta = {};
let stepNum = 0;
let totalSteps = 0;
let rewards = [];

// ── Utility ──────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (sessionId) opts.headers['X-Session-Id'] = sessionId;
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  if (!r.ok) { const t = await r.text(); throw new Error(t); }
  // capture session id from header on reset
  const sid = r.headers.get('x-session-id');
  if (sid) sessionId = sid;
  return r.json();
}

function scoreColor(v) {
  if (v >= 0.75) return '';          // green (default)
  if (v >= 0.4)  return 'mid';
  return 'low';
}

// ── Health check ─────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const h = await api('GET', '/health');
    if (h.status === 'ok') {
      document.getElementById('status-dot').className = 'dot online';
      document.getElementById('status-text').textContent = `Online · ${h.active_sessions} session${h.active_sessions===1?'':'s'}`;
    }
  } catch(e) {
    document.getElementById('status-text').textContent = 'Offline';
  }
}

// ── Load tasks ────────────────────────────────────────────────────────────────
async function loadTasks() {
  taskMeta = await api('GET', '/tasks');
  const container = document.getElementById('task-list');
  container.innerHTML = '';
  for (const [id, t] of Object.entries(taskMeta)) {
    const card = document.createElement('div');
    card.className = 'task-card';
    card.dataset.id = id;
    card.innerHTML = `
      <div class="badge ${t.difficulty}">${t.difficulty.toUpperCase()}</div>
      <h3>${t.name}</h3>
      <p>${t.description.slice(0, 100)}…</p>
      <p style="margin-top:6px;font-size:0.7rem;color:var(--muted)">${t.max_steps} emails</p>`;
    card.addEventListener('click', () => selectTask(id, card));
    container.appendChild(card);
  }
}

function selectTask(id, card) {
  document.querySelectorAll('.task-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  currentTask = id;
  document.getElementById('start-btn').disabled = false;
}

// ── Start episode ─────────────────────────────────────────────────────────────
async function startEpisode() {
  if (!currentTask) return;
  rewards = [];
  document.getElementById('reward-history').innerHTML = '';
  document.getElementById('start-btn').disabled = true;
  sessionId = null;

  const obs = await api('POST', '/reset', { task_id: currentTask });
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('episode-content').style.display = 'flex';
  renderObservation(obs);
}

// ── Render observation ────────────────────────────────────────────────────────
function renderObservation(obs) {
  if (obs.done) { renderDone(); return; }
  stepNum = obs.step_number;
  totalSteps = obs.total_steps;

  // Progress
  const pct = totalSteps ? (stepNum / totalSteps) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${stepNum + 1} / ${totalSteps}`;

  // Email card
  const e = obs.email;
  document.getElementById('email-card-wrap').innerHTML = `
    <div class="email-card">
      <div class="email-header">
        <div class="email-subject">${e.subject}</div>
        <div class="email-meta">
          <span class="label">From</span><span>${e.sender} &lt;${e.sender_email}&gt;</span>
          <span class="label">Date</span><span>${new Date(e.timestamp).toLocaleString()}</span>
          <span class="label">Thread</span><span>${e.thread_length} message${e.thread_length===1?'':'s'}</span>
          <span class="label">ID</span><span style="color:var(--muted);font-size:0.7rem">${e.id}</span>
        </div>
      </div>
      <div class="email-body">${e.body}</div>
    </div>`;

  // Action form
  renderActionForm(obs.task_id);
}

// ── Action form ───────────────────────────────────────────────────────────────
function renderActionForm(taskId) {
  const wrap = document.getElementById('action-form-wrap');

  const isTask1 = taskId === 'task1_spam';
  const isTask3 = taskId === 'task3_full_triage';

  wrap.innerHTML = `
    <div class="action-form">
      <h4>Submit Action — ${taskMeta[taskId]?.name || taskId}</h4>

      <div class="field ${isTask1 ? '' : 'hidden'}" id="f-spam">
        <label>Spam Label</label>
        <select id="spam_label">
          <option value="">— select —</option>
          <option value="spam">spam</option>
          <option value="not_spam">not_spam</option>
        </select>
      </div>

      <div class="field ${isTask1 ? 'hidden' : ''}" id="f-priority">
        <label>Priority</label>
        <select id="priority">
          <option value="">— select —</option>
          <option value="low">low</option>
          <option value="medium">medium</option>
          <option value="high">high</option>
          <option value="urgent">urgent</option>
        </select>
      </div>

      <div class="field ${isTask1 ? 'hidden' : ''}" id="f-dept">
        <label>Department</label>
        <select id="department">
          <option value="">— select —</option>
          <option value="sales">sales</option>
          <option value="support">support</option>
          <option value="billing">billing</option>
          <option value="hr">hr</option>
          <option value="technical">technical</option>
          <option value="general">general</option>
        </select>
      </div>

      <div class="field ${isTask3 ? '' : 'hidden'}" id="f-items">
        <label>Action Items</label>
        <ul class="action-items-list" id="items-list">
          <li>
            <input type="text" placeholder="Action item 1…">
            <button class="btn-ghost" onclick="addItem()">+ Add</button>
          </li>
        </ul>
      </div>

      <div class="field ${isTask3 ? '' : 'hidden'}" id="f-reply">
        <label>Reply Draft</label>
        <textarea id="reply_draft" rows="4" placeholder="Draft a professional reply…"></textarea>
      </div>

      <button class="btn-submit" id="submit-btn" onclick="submitAction()">
        Submit →
      </button>
    </div>`;
}

function addItem() {
  const list = document.getElementById('items-list');
  const li = document.createElement('li');
  li.innerHTML = `<input type="text" placeholder="Action item…">
    <button class="btn-ghost" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(li);
}

// ── Submit action ─────────────────────────────────────────────────────────────
async function submitAction() {
  document.getElementById('submit-btn').disabled = true;
  const action = {};

  const spam = document.getElementById('spam_label');
  if (spam && spam.value) action.spam_label = spam.value;

  const pri = document.getElementById('priority');
  if (pri && pri.value) action.priority = pri.value;

  const dept = document.getElementById('department');
  if (dept && dept.value) action.department = dept.value;

  const itemInputs = document.querySelectorAll('#items-list input');
  if (itemInputs.length) {
    const items = Array.from(itemInputs).map(i => i.value.trim()).filter(Boolean);
    if (items.length) action.action_items = items;
  }

  const reply = document.getElementById('reply_draft');
  if (reply && reply.value.trim()) action.reply_draft = reply.value.trim();

  try {
    const result = await api('POST', '/step', action);
    appendReward(result.reward, stepNum + 1);
    renderObservation(result.observation);
  } catch(e) {
    alert('Error: ' + e.message);
    document.getElementById('submit-btn').disabled = false;
  }
}

// ── Reward history ────────────────────────────────────────────────────────────
function appendReward(reward, step) {
  rewards.push(reward.value);
  const hist = document.getElementById('reward-history');

  // Remove placeholder if present
  const ph = hist.querySelector('.placeholder');
  if (ph) ph.remove();

  const div = document.createElement('div');
  div.className = 'reward-item';
  const cls = scoreColor(reward.value);
  const chips = Object.entries(reward.breakdown || {}).map(([k, v]) =>
    `<span class="breakdown-chip">${k}: ${v.toFixed(2)}</span>`).join('');
  div.innerHTML = `
    <div class="step-label">Step ${step}</div>
    <div class="reward-score ${cls}">${reward.value.toFixed(3)}</div>
    ${chips ? `<div class="breakdown">${chips}</div>` : ''}
    <div class="feedback">${reward.feedback}</div>`;
  hist.prepend(div);
}

// ── Episode done ──────────────────────────────────────────────────────────────
async function renderDone() {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = `${totalSteps} / ${totalSteps}`;
  document.getElementById('email-card-wrap').innerHTML = '';
  document.getElementById('action-form-wrap').innerHTML = '';

  let mean = 0, total = 0;
  try {
    const sm = await api('GET', '/summary');
    mean = sm.mean_reward;
    total = sm.total_reward;
  } catch(_) {
    mean = rewards.reduce((a,b)=>a+b,0) / (rewards.length||1);
    total = rewards.reduce((a,b)=>a+b,0);
  }

  const hist = document.getElementById('reward-history');
  const banner = document.createElement('div');
  banner.className = 'episode-banner';
  banner.innerHTML = `
    <h3>Episode Complete 🎉</h3>
    <div class="big-score">${mean.toFixed(3)}</div>
    <p>Mean reward across ${rewards.length} step${rewards.length===1?'':'s'} &nbsp;·&nbsp; Total: ${total.toFixed(3)}</p>`;
  hist.prepend(banner);

  // Re-enable start button
  const wrap = document.getElementById('action-form-wrap');
  wrap.innerHTML = `<div style="padding:24px;text-align:center">
    <p style="color:var(--muted);margin-bottom:16px;font-size:0.85rem">Episode complete. Mean reward: <strong style="color:var(--accent2)">${mean.toFixed(3)}</strong></p>
    <button class="btn-submit" onclick="startEpisode()" style="max-width:240px;margin:auto">
      Play Again
    </button>
  </div>`;
  document.getElementById('start-btn').disabled = false;
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startEpisode);

(async () => {
  await checkHealth();
  setInterval(checkHealth, 15000);
  await loadTasks();
})();
</script>
</body>
</html>
